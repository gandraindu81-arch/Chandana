<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandana Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
    <div class="logo">Chandana</div>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Hero Section -->
<section id="home" class="hero">
    <h1>Welcome to Chandana Designer Portfolio</h1>
    <p>Elegant & Modern Designer Dresses</p>
</section>

<!-- About Section -->
<section id="about">
    <h2>About Chandana</h2>
    <p>I design elegant and modern dresses. Welcome to my designer portfolio!</p>
    <img src="images/project1.jpeg" alt="Designer Dress 1" class="about-img">
</section>

<!-- Portfolio Section -->
<section id="portfolio">
    <h2>Portfolio</h2>
    <div class="projects">
        <div class="project">
            <img src="images/project1.jpeg" alt="Designer Dress 1">
        </div>
        <div class="project">
            <img src="images/project2.jpeg" alt="Designer Dress 2">
        </div>
        <div class="project">
            <img src="images/project3.jpeg" alt="Designer Dress 3">
        </div>
        <div class="project">
            <img src="images/project4.jpeg" alt="Designer Dress 4">
        </div>
    </div>
</section>

<!-- Contact Section -->
<section id="contact">
    <h2>Contact Me</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
